services:
  postgres:
    image: postgres:16-alpine
    container_name: kalem-sozluk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kalem_sozluk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kalem_sozluk_postgres:/var/lib/postgresql/data

volumes:
  kalem_sozluk_postgres:
